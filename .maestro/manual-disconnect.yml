appId: com.dmanto.blefakerdemo
---
- launchApp
- extendedWaitUntil:
    visible: "Heart Rate Monitor"
    timeout: 10000

# Scan and connect
- tapOn:
    id: "scan-button"
- extendedWaitUntil:
    visible: "CorSense"
    timeout: 10000
- tapOn: "CorSense"
- extendedWaitUntil:
    visible:
      id: "bpm-value"
    timeout: 10000

# Disconnect via button
- tapOn:
    id: "disconnect-button"
- assertVisible: "Heart Rate Monitor"
- assertVisible: "Scan for devices"
