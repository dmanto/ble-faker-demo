name: Maestro (Android)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - run: npm ci

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM (Android emulator hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Start ble-faker
        run: npx ble-faker --port 58083 &

      - name: Start Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: |
            cat > /tmp/run_tests.sh << 'EOF'
            #!/bin/bash
            set -e
            timeout 600 bash -c 'until adb shell pm list packages | grep -q blefakerdemo; do sleep 10; done'
            timeout 120 bash -c 'until nc -z localhost 8081; do sleep 5; done'
            adb reverse tcp:8081 tcp:8081
            adb reverse tcp:58083 tcp:58083
            maestro test .maestro/
            EOF
            chmod +x /tmp/run_tests.sh
            npx --yes concurrently --kill-others --success first \
              "npx cross-env BLE_MOCK=true npx expo run:android" \
              "/tmp/run_tests.sh"

      - name: Upload Maestro logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-logs-android
          path: ~/.maestro/tests/
