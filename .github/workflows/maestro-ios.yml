name: Maestro (iOS)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - run: npm ci

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start ble-faker
        run: npx ble-faker --port 58083 &

      - name: Boot iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '.devices | to_entries[] | .value[] | select(.name | test("iPhone 1[56]")) | .udid' \
            | head -1)
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Patch Podfile for Swift 6 compatibility
        run: |
          python3 - << 'EOF'
          import re, sys
          with open('ios/Podfile', 'r') as f:
              content = f.read()
          injection = (
              "  installer.pods_project.targets.each do |target|\n"
              "    target.build_configurations.each do |config|\n"
              "      config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'\n"
              "      unless target.name == 'MultiplatformBleAdapter'\n"
              "        config.build_settings['SWIFT_VERSION'] = '6.0'\n"
              "      end\n"
              "    end\n"
              "  end\n"
          )
          new_content, count = re.subn(
              r'(post_install\s+do\s+\|[^|]+\|)',
              lambda m: m.group(0) + '\n' + injection,
              content
          )
          if count == 0:
              idx = content.find('post_install')
              ctx = repr(content[max(0, idx-5):idx+60]) if idx >= 0 else '(not found)'
              print('ERROR: post_install block not matched. Context:', ctx)
              sys.exit(1)
          print('Podfile patched successfully')
          with open('ios/Podfile', 'w') as f:
              f.write(new_content)
          EOF

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Build and install app (BLE mock enabled)
        run: npx cross-env BLE_MOCK=true npx expo run:ios --no-install
        timeout-minutes: 20

      - name: Run Maestro flows
        run: maestro test .maestro/
        timeout-minutes: 5

      - name: Upload Maestro logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-logs-ios
          path: ~/.maestro/tests/
